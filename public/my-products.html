<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Products</title>
<style>
  :root{
    --bg:#0d0f0e;--card:#17191a;--card-2:#1f2321;--field:#232827;--border:#2a2f2d;
    --green:#34c77b;--green-soft:rgba(52,199,123,0.14);
    --amber:#e2a83c;--amber-soft:rgba(226,168,60,0.14);
    --gray:#9aa39d;--gray-soft:rgba(154,163,157,0.12);
    --blue:#5b9df0;--blue-soft:rgba(91,157,240,0.13);
    --violet:#a78bfa;
    --text:#f2f3f1;--text-dim:#9aa39d;--text-faint:#6b746e;
    --danger:#f0645a;--danger-soft:rgba(240,100,90,0.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .screen{max-width:560px;margin:0 auto;padding:20px 18px 60px;}

  /* page header */
  .page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;}
  h1.page-title{font-size:26px;font-weight:800;margin:0;letter-spacing:-0.02em;}
  .add-btn{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--text);color:#08150f;border:none;border-radius:99px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;}

  /* search */
  .search-wrap{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:18px;}
  .search-wrap svg{color:var(--text-faint);flex-shrink:0;}
  .search-wrap input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;}
  .search-wrap input::placeholder{color:var(--text-faint);}

  /* filter chips */
  .filter-row{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;}
  .filter-chip{flex-shrink:0;padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:700;background:var(--field);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;white-space:nowrap;}
  .filter-chip.active{background:var(--green-soft);border-color:rgba(52,199,123,0.35);color:var(--green);}

  /* ══════════════════════════════
     PRODUCT CARD
  ══════════════════════════════ */
  .product-card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:14px;overflow:hidden;}
  .product-card.is-draft{border-style:dashed;}

  /* ── COLLAPSED HEAD ── */
  .p-head{display:flex;align-items:center;gap:12px;padding:12px 12px 38px 12px;cursor:pointer;position:relative;}

  /* Thumb */
  .p-thumb-wrap{position:relative;flex-shrink:0;width:64px;height:64px;}
  .p-thumb{
    width:64px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;
    background:linear-gradient(135deg,var(--thumb-a,#22492f),var(--thumb-b,#0f2419));
    transition:width .36s cubic-bezier(.4,0,.2,1), height .36s cubic-bezier(.4,0,.2,1), border-radius .36s ease;
  }

  /* Category tag: bottom-left of photo, expanded only */
  .thumb-category{
    position:absolute;bottom:8px;left:8px;z-index:2;
    font-size:9px;font-weight:800;color:var(--violet);
    background:rgba(14,16,15,0.82);backdrop-filter:blur(4px);
    border:1px solid rgba(167,139,250,0.3);
    padding:3px 8px;border-radius:99px;
    text-transform:uppercase;letter-spacing:0.3px;
    opacity:0;pointer-events:none;transition:opacity .18s ease .1s;
  }
  .product-card.expanded .thumb-category{opacity:1;}

  /* Dots: bottom-right, expanded only */
  .thumb-dots{
    position:absolute;bottom:8px;right:8px;z-index:2;
    display:flex;gap:4px;align-items:center;
    opacity:0;pointer-events:none;transition:opacity .18s ease .1s;
  }
  .product-card.expanded .thumb-dots{opacity:1;}
  .thumb-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.32);cursor:pointer;pointer-events:all;transition:background .15s,width .15s;}
  .thumb-dot.active{width:14px;border-radius:3px;background:rgba(255,255,255,0.9);}

  /* Name + price next to thumb (collapsed only) */
  .p-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
  .p-name-collapsed{font-size:14.5px;font-weight:800;margin:0;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p-price-collapsed{font-size:12px;font-weight:700;color:var(--text-dim);}

  /* Status badges: bottom-LEFT of card, below thumb */
  .p-status-strip{
    position:absolute;bottom:10px;left:12px;
    display:flex;gap:5px;flex-wrap:wrap;
    transition:opacity .18s ease;
  }
  .product-card.expanded .p-status-strip{opacity:0;pointer-events:none;}

  /* Product code: bottom-RIGHT of card (opposite side from status) */
  .p-code-corner{
    position:absolute;bottom:10px;right:12px;
    display:flex;align-items:center;gap:5px;
    background:var(--field);border:1px solid var(--border);border-radius:99px;
    padding:3px 9px;pointer-events:none;
    transition:opacity .18s ease;
  }
  .product-card.expanded .p-code-corner{opacity:0;pointer-events:none;}
  .p-code-corner .code-label{font-size:8px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.3px;}
  .p-code-corner .code-val{font-size:9.5px;font-weight:700;color:var(--text-dim);font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  /* Chevron: top-right absolute */
  .p-chevron{
    position:absolute;top:10px;right:10px;
    width:26px;height:26px;border-radius:50%;
    background:var(--field);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);transition:transform .22s ease;
  }
  .product-card.expanded .p-chevron{transform:rotate(180deg);}

  /* ── EXPANDED HEAD ── */
  /* Thumb stretches full-width; wrap also expands */
  .product-card.expanded .p-head{flex-direction:column;gap:0;padding:12px 12px 12px 12px;align-items:stretch;}
  .product-card.expanded .p-thumb-wrap{width:100%;height:200px;}
  .product-card.expanded .p-thumb{width:100%;height:200px;border-radius:16px;}

  /* In expanded: name + price + desc shown below photo, NOT beside it */
  .product-card.expanded .p-info{display:none;}
  .p-info-expanded{display:none;margin-top:12px;padding:0 2px;}
  .product-card.expanded .p-info-expanded{display:block;}
  .p-name-exp{font-size:16px;font-weight:800;margin:0 0 2px;letter-spacing:-0.01em;}
  .p-name-price-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
  .p-price-exp{font-size:14px;font-weight:700;color:var(--green);}
  .p-desc-exp{font-size:12px;color:var(--text-faint);line-height:1.5;margin:0;}

  /* ── STATUS PILLS ── */
  .status-pill{font-size:10px;font-weight:800;letter-spacing:0.2px;padding:3px 8px;border-radius:99px;display:flex;align-items:center;gap:4px;}
  .status-pill .dot-ind{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .status-active{background:var(--green-soft);color:var(--green);border:1px solid rgba(52,199,123,0.35);}
  .status-active .dot-ind{background:var(--green);}
  .status-inactive{background:var(--gray-soft);color:var(--gray);border:1px solid rgba(154,163,157,0.3);}
  .status-inactive .dot-ind{background:var(--gray);}
  .status-draft{background:transparent;color:var(--text-dim);border:1px dashed var(--border);}
  .status-draft .dot-ind{background:var(--text-faint);}
  .status-lowstock{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(226,168,60,0.35);}
  .status-lowstock .dot-ind{background:var(--amber);}
  .status-outofstock{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(240,100,90,0.35);}
  .status-outofstock .dot-ind{background:var(--danger);}

  /* ══════════════════════════════
     DETAILS PANEL
  ══════════════════════════════ */
  .p-details{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .product-card.expanded .p-details{max-height:5000px;}
  .p-details-inner{padding:0 12px 14px;}
  .divider{height:1px;background:var(--border);margin:0 0 12px;}

  /* ── TOP ROW in details: product-code pill + analytics button ── */
  .details-top-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .details-code-pill{
    display:flex;align-items:center;gap:5px;
    background:var(--field);border:1px solid var(--border);border-radius:99px;
    padding:4px 10px;flex-shrink:0;
  }
  .details-code-pill .code-label{font-size:8px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.3px;}
  .details-code-pill .code-val{font-size:9.5px;font-weight:700;color:var(--text-dim);font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  /* Analytics button (not a dropdown, a toggle button) */
  .analytics-btn-outer{
    display:flex;align-items:center;gap:7px;
    background:var(--green-soft);border:1px solid rgba(52,199,123,0.3);border-radius:99px;
    padding:5px 13px 5px 10px;cursor:pointer;flex:1;justify-content:center;
    transition:background .15s;
  }
  .analytics-btn-outer:hover{background:rgba(52,199,123,0.22);}
  .analytics-btn-outer.open{background:rgba(52,199,123,0.22);}
  .analytics-icon{display:flex;align-items:flex-end;gap:2px;height:13px;flex-shrink:0;}
  .analytics-icon span{display:block;width:3px;border-radius:2px 2px 0 0;background:var(--green);}
  .analytics-btn-label{font-size:12.5px;font-weight:800;color:var(--green);}
  .analytics-chev{color:var(--green);transition:transform .2s ease;margin-left:2px;}
  .analytics-btn-outer.open .analytics-chev{transform:rotate(180deg);}

  /* Analytics panel (hidden by default) */
  .analytics-panel{max-height:0;overflow:hidden;transition:max-height .28s ease;}
  .analytics-panel.open{max-height:3000px;}
  .analytics-panel-inner{padding-top:10px;}

  /* Period chips */
  .analytics-period-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:1px;}
  .period-chip{flex-shrink:0;padding:5px 11px;border-radius:99px;font-size:11px;font-weight:700;background:var(--card-2);border:1px solid var(--border);color:var(--text-faint);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .period-chip.sel{background:var(--green-soft);border-color:rgba(52,199,123,0.35);color:var(--green);}

  /* stat grid */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .stat-tile{background:var(--card-2);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
  .stat-tile .stat-label{font-size:10px;color:var(--text-faint);margin-bottom:4px;font-weight:600;}
  .stat-tile .stat-val{font-size:14px;font-weight:800;color:var(--text);}
  .stat-tile.accent .stat-val{color:var(--green);}
  .stat-tile.warn .stat-val{color:var(--amber);}

  /* variant boxes */
  .variant-group-box{background:var(--card-2);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px;}
  .variant-group-box:last-child{margin-bottom:0;}
  .vg-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .vg-title{font-size:13px;font-weight:800;color:var(--text);}
  .vg-total{font-size:11px;color:var(--text-dim);font-weight:700;}
  .vg-value-row{padding:10px 0;border-top:1px solid var(--border);}
  .vg-value-row:first-of-type{border-top:none;padding-top:0;}
  .vg-value-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .vg-swatch{width:26px;height:26px;border-radius:8px;flex-shrink:0;border:1px solid rgba(255,255,255,0.12);}
  .vg-value-name{font-size:12.5px;font-weight:700;color:var(--text);width:56px;flex-shrink:0;}
  .vg-bar-track{flex:1;height:6px;border-radius:99px;background:var(--field);overflow:hidden;}
  .vg-bar-fill{height:100%;border-radius:99px;background:var(--green);}
  .vg-bar-fill.low{background:var(--amber);}
  .vg-bar-fill.empty{background:var(--danger);}
  .vg-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .vg-mini{background:var(--field);border-radius:9px;padding:7px 6px;text-align:center;}
  .vg-mini .l{font-size:9.5px;color:var(--text-faint);font-weight:600;margin-bottom:2px;}
  .vg-mini .v{font-size:12.5px;font-weight:800;color:var(--text);}
  .vg-mini.warn .v{color:var(--amber);}

  /* marketer info — GREEN */
  .fold-section{background:var(--field);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .fold-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
  .fold-label{font-size:13px;font-weight:800;color:var(--text);}
  .fold-sub{font-size:11px;color:var(--text-faint);font-weight:600;margin-top:2px;}
  .fold-chevron{color:var(--text-dim);transition:transform .2s ease;flex-shrink:0;}
  .fold-chevron.open{transform:rotate(180deg);}
  .fold-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .fold-body.open{max-height:2000px;}
  .fold-body-inner{padding:0 14px 14px;}

  /* marketer fold — green tint */
  .fold-section.marketer-fold{background:var(--green-soft);border-color:rgba(52,199,123,0.25);}
  .fold-section.marketer-fold .fold-label{color:var(--green);}
  .fold-section.marketer-fold .fold-chevron{color:var(--green);}
  .mb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .mb-tile{text-align:center;}
  .mb-tile .l{font-size:10px;color:rgba(52,199,123,0.7);font-weight:600;margin-bottom:3px;}
  .mb-tile .v{font-size:14px;font-weight:800;color:var(--text);}

  /* shipping fold */
  .country-box{background:var(--card-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .country-box:last-child{margin-bottom:0;}
  .country-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;margin-bottom:2px;}
  .country-head .cname{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .country-head .cship{font-size:11.5px;color:var(--text-dim);text-align:right;}
  .country-head .cship b{color:var(--green);font-size:12.5px;}
  .city-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);}
  .city-row b{color:var(--text);font-weight:700;}
  .city-row .dfee b{color:var(--green);}

  /* reviews */
  .review-item{padding:10px 0;border-top:1px solid var(--border);}
  .review-item:first-of-type{border-top:none;padding-top:0;}
  .review-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .review-name{font-size:12.5px;font-weight:700;color:var(--text);}
  .review-stars{font-size:11px;color:var(--amber);letter-spacing:1px;}
  .review-text{font-size:12px;color:var(--text-dim);line-height:1.45;}

  .empty-note{background:var(--field);border:1px dashed var(--border);border-radius:14px;padding:16px;text-align:center;font-size:13px;color:var(--text-faint);line-height:1.5;}

  /* actions */
  .action-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .action-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:11px 10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--field);color:var(--text-dim);}
  .action-btn.primary{background:var(--green-soft);border-color:rgba(52,199,123,0.35);color:var(--green);}
  .action-btn.warn{background:var(--amber-soft);border-color:rgba(226,168,60,0.35);color:var(--amber);}
  .icon-btn{flex-shrink:0;width:34px;height:34px;border-radius:9px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-faint);transition:color .15s;}
  .icon-btn:hover{color:var(--text-dim);}
  .icon-btn.danger{color:rgba(240,100,90,0.4);}
  .icon-btn.danger:hover{color:var(--danger);}

  /* ── SWIPE / SCROLL for photo ── */
  .p-thumb-wrap{overflow:hidden;border-radius:12px;transition:width .36s cubic-bezier(.4,0,.2,1),height .36s cubic-bezier(.4,0,.2,1),border-radius .36s ease;}
  .p-thumb-track{display:flex;height:100%;transition:transform .32s cubic-bezier(.4,0,.2,1);}
  .p-thumb-slide{flex-shrink:0;width:100%;height:100%;}
  /* In collapsed state the wrap is fixed 64×64 and only shows one slide */
  /* In expanded state it's full-width */
  .product-card.expanded .p-thumb-wrap{width:100%;height:200px;border-radius:16px;}
</style>
</head>
<body>

  <div class="search-wrap">

    <div class="filter-chip">Low stock</div>
    <div class="filter-chip">Draft</div>

  <div id="product-list"></div>
</div>

          {value:"Blue",qty:2,sold:7,color:"#2e6da4"}
        ]},
        {name:"Size",values:[
          {value:"S/M",qty:2,sold:6,color:"#3a4a52"},
          {value:"L/XL",qty:1,sold:6,color:"#26333a"}
        ]}
      ],
      shipping:[
        {country:"Libya",flag:"🇱🇾",shippingFee:20,cities:[{city:"Tripoli",deliveryFee:23},{city:"Zawiya",deliveryFee:20}]},
        {country:"Tunisia",flag:"🇹🇳",shippingFee:35,cities:[{city:"Tunis",deliveryFee:28}]}
      ],
      photos:["#2a3d49:#121e24","#1e3040:#0d1a22","#354d5c:#182630"]
    },
    {
      id:5, name:"Studio Tote", code:"LT-P0LK9M", category:"Bags",
      description:"Canvas tote with reinforced handles, fits a 13-inch laptop.",
      thumbA:"#493034", thumbB:"#231317",
      price:130, status:"inactive",
      marketerFee:{type:"percent",value:20}, activeMarketers:1,
      rating:4.0, reviews:[{name:"Nour S.",stars:4,text:"Sturdy canvas, wish it came in more colors."}],
      variants:[{name:"Size",values:[{value:"One size",qty:2,sold:5,color:"#7d5a5f"}]}],
      shipping:[{country:"Libya",flag:"🇱🇾",shippingFee:25,cities:[{city:"Sabha",deliveryFee:30}]}],
      photos:["#493034:#231317"]
    },
    {
      id:6, name:"Linen Scarf", code:"LT-QW3XZ1", category:"Accessories",
      description:"Lightweight linen scarf, breathable weave for warm climates.",
      thumbA:"#333333", thumbB:"#161616",
      price:75, status:"draft",
      marketerFee:{type:"percent",value:10}, activeMarketers:0,
      rating:null, reviews:[],
      variants:[], shipping:[],
      photos:["#333333:#161616"]
    }
  ];

  const photoIndex = {};
  const analyticsOpen = {};

  function money(n){ return `${n.toFixed(2)} LYD`; }

  function totals(p){
    if(!p.variants.length) return {stock:null,sold:null};
    let stock=0,sold=0;
    p.variants.forEach(g=>g.values.forEach(v=>{stock+=v.qty;sold+=v.sold;}));
    return {stock,sold};
  }

  function statusBadges(p,stock){
    const b=[];
    if(p.status==="active")   b.push(`<span class="status-pill status-active"><span class="dot-ind"></span>Active</span>`);
    if(p.status==="inactive") b.push(`<span class="status-pill status-inactive"><span class="dot-ind"></span>Paused</span>`);
    if(p.status==="draft")    b.push(`<span class="status-pill status-draft"><span class="dot-ind"></span>Draft</span>`);
    if(stock !== null && stock === 0)                         b.push(`<span class="status-pill status-outofstock"><span class="dot-ind"></span>Out of stock</span>`);
    else if(stock !== null && stock <= LOW_STOCK_THRESHOLD)   b.push(`<span class="status-pill status-lowstock"><span class="dot-ind"></span>Low stock</span>`);
    return b.join("");
  }

  const PERIOD_MULTIPLIERS = {day:0.04,month:0.28,year:0.72,all:1};

  function periodTotals(p,period){
    const m=PERIOD_MULTIPLIERS[period]??1;
    let stock=0,sold=0;
    p.variants.forEach(g=>g.values.forEach(v=>{stock+=v.qty;sold+=v.sold;}));
    return {stock,sold:Math.round(sold*m)};
  }

  function variantGroupBoxes(p,period){
    const m=PERIOD_MULTIPLIERS[period]??1;
    return p.variants.map(dim=>{
      const groupTotal=dim.values.reduce((s,v)=>s+v.qty,0);
      const maxQty=Math.max(...dim.values.map(v=>v.qty),1);
      const rows=dim.values.map(v=>{
        const pct=Math.max(8,Math.round(v.qty/maxQty*100));
        const low=v.qty===0?"empty":(v.qty<=LOW_STOCK_THRESHOLD?"low":"");
        const ps=Math.round(v.sold*m);
        return `<div class="vg-value-row">
          <div class="vg-value-top">
            <div class="vg-swatch" style="background:${v.color}"></div>
            <span class="vg-value-name">${v.value}</span>
            <div class="vg-bar-track"><div class="vg-bar-fill ${low}" style="width:${pct}%"></div></div>
          </div>
          <div class="vg-mini-grid">
            <div class="vg-mini ${low?'warn':''}"><div class="l">In stock</div><div class="v">${v.qty}</div></div>
            <div class="vg-mini"><div class="l">Sold</div><div class="v">${ps}</div></div>
            <div class="vg-mini"><div class="l">Revenue</div><div class="v">${money(ps*p.price)}</div></div>
          </div>
        </div>`;
      }).join("");
      return `<div class="variant-group-box">
        <div class="vg-title-row"><span class="vg-title">${dim.name}</span><span class="vg-total">${groupTotal} in stock</span></div>
        ${rows}
      </div>`;
    }).join("");
  }

  function analyticsBody(p,stock,period){
    const pt=periodTotals(p,period);
    const stockClass=stock===0?'warn':stock<=LOW_STOCK_THRESHOLD?'warn':'accent';
    return `
      <div class="stat-grid">
        <div class="stat-tile"><div class="stat-label">Sold</div><div class="stat-val">${pt.sold}</div></div>
        <div class="stat-tile ${stockClass}"><div class="stat-label">In stock</div><div class="stat-val">${stock}</div></div>
        <div class="stat-tile"><div class="stat-label">Revenue</div><div class="stat-val">${money(pt.sold*p.price)}</div></div>
      </div>
      ${variantGroupBoxes(p,period)}`;
  }

  function analyticsSection(p,stock){
    if(stock===null){
      return `<div class="analytics-panel-inner"><div class="empty-note">Sales, revenue and stock will appear here once you publish it.</div></div>`;
    }
    return `<div class="analytics-panel-inner">
      <div class="analytics-period-row" id="period-row-${p.id}">
        <div class="period-chip" data-pid="${p.id}" data-period="day" onclick="setPeriod(${p.id},'day')">Today</div>
        <div class="period-chip" data-pid="${p.id}" data-period="month" onclick="setPeriod(${p.id},'month')">This month</div>
        <div class="period-chip" data-pid="${p.id}" data-period="year" onclick="setPeriod(${p.id},'year')">This year</div>
        <div class="period-chip sel" data-pid="${p.id}" data-period="all" onclick="setPeriod(${p.id},'all')">All time</div>
      </div>
      <div id="analytics-body-${p.id}">${analyticsBody(p,stock,'all')}</div>
    </div>`;
  }

  function setPeriod(pid,period){
    const p=products.find(x=>x.id===pid); if(!p) return;
    const {stock}=totals(p);
    document.querySelectorAll(`[data-pid="${pid}"]`).forEach(el=>el.classList.toggle('sel',el.dataset.period===period));
    document.getElementById(`analytics-body-${pid}`).innerHTML=analyticsBody(p,stock,period);
  }

  function marketerFold(p){
    const feeLabel=p.marketerFee.type==="percent"?`${p.marketerFee.value}%`:money(p.marketerFee.value);
    const profit=p.marketerFee.type==="percent"?p.price*p.marketerFee.value/100:p.marketerFee.value;
    return `<div class="fold-section marketer-fold">
      <div class="fold-head" onclick="toggleFold('marketer-${p.id}')">
        <div><div class="fold-label">Marketer info</div></div>
        <svg class="fold-chevron" id="chev-marketer-${p.id}" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="fold-body" id="fold-marketer-${p.id}">
        <div class="fold-body-inner">
          <div class="mb-grid">
            <div class="mb-tile"><div class="l">Marketer fee</div><div class="v">${feeLabel}</div></div>
            <div class="mb-tile"><div class="l">Fixed price</div><div class="v">${money(profit)}</div></div>
            <div class="mb-tile"><div class="l">Active marketers</div><div class="v">${p.activeMarketers}</div></div>
          </div>
        </div>
      </div>
    </div>`;
  }

  function shippingFold(p){
    if(!p.shipping.length) return "";
    const boxes=p.shipping.map(c=>`
      <div class="country-box">
        <div class="country-head">
          <span class="cname">${c.flag} ${c.country}</span>
          <span class="cship">Shipping<br><b>${money(c.shippingFee)}</b></span>
        </div>
        ${c.cities.map(ci=>`<div class="city-row"><span><b>${ci.city}</b></span><span class="dfee">Delivery <b>${money(ci.deliveryFee)}</b></span></div>`).join("")}
      </div>`).join("");
    return `<div class="fold-section">
      <div class="fold-head" onclick="toggleFold('shipping-${p.id}')">
        <div><div class="fold-label">Shipping & delivery</div><div class="fold-sub">${p.shipping.length} ${p.shipping.length===1?'country':'countries'}</div></div>
        <svg class="fold-chevron" id="chev-shipping-${p.id}" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="fold-body" id="fold-shipping-${p.id}">
        <div class="fold-body-inner">${boxes}</div>
      </div>
    </div>`;
  }

  function reviewsFold(p){
    const noReviews=p.rating===null;
    const sub=noReviews?"No reviews yet":`${p.rating.toFixed(1)} ★ · ${p.reviews.length} reviews`;
    const body=noReviews
      ?`<div class="empty-note">Reviews will show up here once this product is published and sold.</div>`
      :p.reviews.map(r=>`<div class="review-item"><div class="review-top"><span class="review-name">${r.name}</span><span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span></div><div class="review-text">${r.text}</div></div>`).join("");
    return `<div class="fold-section">
      <div class="fold-head" onclick="toggleFold('reviews-${p.id}')">
        <div><div class="fold-label">Reviews</div><div class="fold-sub">${sub}</div></div>
        <svg class="fold-chevron" id="chev-reviews-${p.id}" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="fold-body" id="fold-reviews-${p.id}">
        <div class="fold-body-inner">${body}</div>
      </div>
    </div>`;
  }

  const ICON_EDIT=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l4 4L7 21H3v-4L15 5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 7l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
  const ICON_TRASH=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 7h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9 7V4.5h6V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="4" y="7" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>`;

  function actionsRow(p){
    const primary=p.status==="draft"?`<div class="action-btn primary">Publish</div>`
      :p.status==="inactive"?`<div class="action-btn primary">Activate</div>`
      :`<div class="action-btn warn">Pause</div>`;
    return `<div class="action-row"><div class="icon-btn" title="Edit">${ICON_EDIT}</div>${primary}<div class="icon-btn danger" title="Delete">${ICON_TRASH}</div></div>`;
  }

  function photoGradient(photos, idx){
    const parts=(photos[idx]||photos[0]).split(":");
    return `linear-gradient(135deg,${parts[0]},${parts[1]})`;
  }

  function slidesHtml(p){
    return p.photos.map((ph,i)=>{
      const parts=ph.split(":");
      return `<div class="p-thumb-slide" style="background:linear-gradient(135deg,${parts[0]},${parts[1]})"></div>`;
    }).join("");
  }

  function dotsHtml(p){
    if(!p.photos||p.photos.length<=1) return "";
    const dots=p.photos.map((_,i)=>`<span class="thumb-dot${i===0?' active':''}" onclick="event.stopPropagation();slidePhoto(${p.id},${i})"></span>`).join("");
    return `<div class="thumb-dots">${dots}</div>`;
  }

  function renderCard(p){
    const {stock,sold}=totals(p);
    const isDraft=p.status==="draft";
    photoIndex[p.id]=0;
    analyticsOpen[p.id]=false;

    return `
    <div class="product-card ${isDraft?'is-draft':''}" data-id="${p.id}">

      <div class="p-head" onclick="toggleCard(${p.id})">

        <!-- photo (collapsed: 64×64, expanded: full-width 200px) -->
        <div class="p-thumb-wrap" id="thumb-wrap-${p.id}">
          <div class="p-thumb" id="thumb-${p.id}">
            <div class="p-thumb-track" id="thumb-track-${p.id}">${slidesHtml(p)}</div>
            <span class="thumb-category">${p.category}</span>
            ${dotsHtml(p)}
          </div>
        </div>

        <!-- name + price beside thumb (collapsed only) -->
        <div class="p-info">
          <p class="p-name-collapsed">${p.name}</p>
          <span class="p-price-collapsed">${money(p.price)}</span>
        </div>

        <!-- status badges: bottom-left -->
        <div class="p-status-strip">${statusBadges(p,stock)}</div>

        <!-- product code: bottom-right (opposite of status) -->
        <div class="p-code-corner">
          <span class="code-label">Product code</span>
          <span class="code-val">${p.code}</span>
        </div>

        <!-- chevron: top-right -->
        <div class="p-chevron">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <!-- name / price / desc below photo (expanded only) -->
        <div class="p-info-expanded">
          <div class="p-name-price-row">
            <p class="p-name-exp">${p.name}</p>
            <span class="p-price-exp">${money(p.price)}</span>
          </div>
          <p class="p-desc-exp">${p.description}</p>
        </div>

      </div><!-- /p-head -->

      <div class="p-details">
        <div class="p-details-inner">
          <div class="divider"></div>

          <!-- product code pill + analytics button on same row -->
          <div class="details-top-row">
            <div class="details-code-pill">
              <span class="code-label">Product code</span>
              <span class="code-val">${p.code}</span>
            </div>
            <div class="analytics-btn-outer" id="abtn-${p.id}" onclick="event.stopPropagation();toggleAnalytics(${p.id})">
              <div class="analytics-icon">
                <span style="height:5px;opacity:.5"></span>
                <span style="height:9px;opacity:.7"></span>
                <span style="height:13px"></span>
              </div>
              <span class="analytics-btn-label">Analytics</span>
              <svg class="analytics-chev" width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>

          <!-- analytics panel -->
          <div class="analytics-panel" id="analytics-panel-${p.id}">
            ${analyticsSection(p,stock)}
          </div>

          ${marketerFold(p)}
          ${shippingFold(p)}
          ${reviewsFold(p)}
          ${actionsRow(p)}
        </div>
      </div>

    </div>`;
  }

  document.getElementById('product-list').innerHTML=products.map(renderCard).join("");

  function toggleCard(id){
    document.querySelector(`.product-card[data-id="${id}"]`).classList.toggle('expanded');
  }

  function toggleFold(key){
    document.getElementById(`fold-${key}`).classList.toggle('open');
    const c=document.getElementById(`chev-${key}`);
    if(c) c.classList.toggle('open');
  }

  function toggleAnalytics(pid){
    analyticsOpen[pid]=!analyticsOpen[pid];
    document.getElementById(`abtn-${pid}`).classList.toggle('open',analyticsOpen[pid]);
    document.getElementById(`analytics-panel-${pid}`).classList.toggle('open',analyticsOpen[pid]);
  }

  function slidePhoto(pid,idx){
    const p=products.find(x=>x.id===pid); if(!p||!p.photos) return;
    photoIndex[pid]=idx;
    const track=document.getElementById(`thumb-track-${pid}`);
    if(track) track.style.transform=`translateX(-${idx*100}%)`;
    document.querySelectorAll(`.product-card[data-id="${pid}"] .thumb-dot`).forEach((d,i)=>{
      d.classList.toggle('active',i===idx);
    });
  }

  // Touch/swipe support on photo
  function initSwipe(pid){
    const wrap=document.getElementById(`thumb-${pid}`);
    if(!wrap) return;
    let startX=0,startY=0,dragging=false;
    wrap.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;
    },{passive:true});
    wrap.addEventListener('touchend',e=>{
      if(!dragging) return; dragging=false;
      const dx=e.changedTouches[0].clientX-startX;
      const dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
        const p=products.find(x=>x.id===pid);
        const cur=photoIndex[pid]||0;
        const next=dx<0?Math.min(cur+1,p.photos.length-1):Math.max(cur-1,0);
        slidePhoto(pid,next);
      }
    },{passive:true});
  }

  products.forEach(p=>initSwipe(p.id));

  toggleCard(1);
</script>
</body>
</html>
